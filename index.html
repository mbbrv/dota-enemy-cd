<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dota Enemy CD</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="i-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" />
      </symbol>
      <symbol id="i-play" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z" />
      </symbol>
      <symbol id="i-stop" viewBox="0 0 24 24">
        <path d="M7 7h10v10H7z" />
      </symbol>
      <symbol id="i-bell" viewBox="0 0 24 24">
        <path d="M10 20a2 2 0 0 0 4 0" />
        <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" />
      </symbol>
      <symbol id="i-bell-off" viewBox="0 0 24 24">
        <path d="m2 2 20 20" />
        <path d="M8.6 4.7A6 6 0 0 1 18 8c0 2.1.3 3.6.8 4.7" />
        <path d="M6.2 6.2C6.1 6.8 6 7.4 6 8c0 7-3 7-3 9h14" />
        <path d="M10 20a2 2 0 0 0 4 0" />
      </symbol>
      <symbol id="i-trash" viewBox="0 0 24 24">
        <path d="M3 6h18" />
        <path d="M8 6V4h8v2" />
        <path d="M6 6l1 15h10l1-15" />
        <path d="M10 11v6M14 11v6" />
      </symbol>
      <symbol id="i-star" viewBox="0 0 24 24">
        <path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.3l-5.6 2.9 1.1-6.2L3 9.6l6.2-.9z" />
      </symbol>
      <symbol id="i-reset" viewBox="0 0 24 24">
        <path d="M4 4v6h6" />
        <path d="M20 11a8 8 0 1 0-2.3 5.7" />
      </symbol>
      <symbol id="i-download" viewBox="0 0 24 24">
        <path d="M12 3v12" />
        <path d="m7 10 5 5 5-5" />
        <path d="M5 21h14" />
      </symbol>
      <symbol id="i-upload" viewBox="0 0 24 24">
        <path d="M12 15V3" />
        <path d="m7 8 5-5 5 5" />
        <path d="M5 21h14" />
      </symbol>
      <symbol id="i-copy" viewBox="0 0 24 24">
        <path d="M8 8h11v11H8z" />
        <path d="M5 16H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v1" />
      </symbol>
    </svg>

    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">CD</div>
        <div>
          <h1>Dota Enemy CD</h1>
          <p>Ручная доска таймеров</p>
        </div>
      </div>

      <div class="toolbar" aria-label="Панель управления">
        <div class="segmented" role="tablist" aria-label="Режим">
          <button class="segment is-active" type="button" data-mode="setup">Настройка</button>
          <button class="segment" type="button" data-mode="match">Матч</button>
        </div>

        <button id="matchToggle" class="command-button match-button" type="button">
          <svg><use href="#i-play"></use></svg>
          Начать матч
        </button>

        <span id="desktopStatus" class="desktop-status" data-state="browser">Browser</span>

        <div class="segmented" role="tablist" aria-label="Фильтр скиллов">
          <button class="segment is-active" type="button" data-filter="all">Все</button>
          <button class="segment" type="button" data-filter="ults">Ульты</button>
          <button class="segment" type="button" data-filter="min">CD >=</button>
          <button class="segment" type="button" data-filter="tracked">Избранное</button>
        </div>

        <label class="number-control" title="Минимальный кулдаун для фильтра CD >=">
          <span>сек</span>
          <input id="minCooldown" type="number" min="1" max="999" step="1" value="90" />
        </label>

        <button id="soundToggle" class="icon-button" type="button" title="Звук включен" aria-pressed="true">
          <svg><use href="#i-bell"></use></svg>
        </button>

        <label class="volume-control" title="Громкость сигнала">
          <input id="volume" type="range" min="0" max="100" value="55" />
        </label>

        <button id="resetTimers" class="icon-button" type="button" title="Сбросить активные таймеры">
          <svg><use href="#i-reset"></use></svg>
        </button>

        <button id="copyActive" class="icon-button" type="button" title="Скопировать активные кулдауны">
          <svg><use href="#i-copy"></use></svg>
        </button>

        <button id="exportState" class="icon-button" type="button" title="Скопировать настройки">
          <svg><use href="#i-download"></use></svg>
        </button>

        <button id="importState" class="icon-button" type="button" title="Импортировать настройки">
          <svg><use href="#i-upload"></use></svg>
        </button>

        <button id="addHero" class="command-button" type="button">
          <svg><use href="#i-plus"></use></svg>
          Герой
        </button>
      </div>
    </header>

    <main class="app-layout">
      <section class="status-strip" aria-live="polite">
        <div>
          <span class="status-label">Активно</span>
          <strong id="activeCount">0</strong>
        </div>
        <div>
          <span class="status-label">Матч</span>
          <strong id="matchClock">0:00</strong>
        </div>
        <div>
          <span class="status-label">Готово</span>
          <strong id="readyCount">0</strong>
        </div>
        <div class="next-ready">
          <span class="status-label">Ближайший</span>
          <strong id="nextReady">-</strong>
        </div>
      </section>

      <section class="active-panel" aria-live="polite">
        <div class="active-panel-head">
          <span class="status-label">Активные кулдауны</span>
          <strong id="activeSummary">Нет</strong>
        </div>
        <div id="activeTimers" class="active-timers"></div>
      </section>

      <section id="board" class="enemy-grid" aria-label="Таймеры врагов"></section>
    </main>

    <script src="presets.js"></script>
    <script src="app.js"></script>
  </body>
</html>
