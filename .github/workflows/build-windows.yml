name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build portable exe
    runs-on: windows-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript
        run: npm run check

      - name: Build portable exe
        run: npm run pack:win

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: DotaEnemyCD-windows-portable
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Publish latest release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "latest"
          $title = "Latest Windows build"
          $notes = "Automatic Windows build from commit $env:GITHUB_SHA."
          $asset = Get-ChildItem -Path dist -Filter *.exe | Select-Object -First 1

          if (-not $asset) {
            throw "No exe found in dist"
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $tag $env:GITHUB_SHA
          git push origin "refs/tags/$tag" --force

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset.FullName --clobber
            gh release edit $tag --title $title --notes $notes --target $env:GITHUB_SHA --latest
          } else {
            gh release create $tag $asset.FullName --title $title --notes $notes --target $env:GITHUB_SHA --latest
          }
